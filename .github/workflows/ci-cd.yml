name: CI/CD - Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 构建和测试
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Type check
      run: npx tsc --noEmit
    
    - name: Build
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  # 部署到服务器（可选）
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    # 需要配置 Secrets 才能启用
    # 在 GitHub 仓库 Settings -> Secrets and variables -> Actions 中添加：
    # - SSH_PRIVATE_KEY: 服务器私钥
    # - SERVER_HOST: 服务器IP或域名
    # - SERVER_USER: 服务器用户名
    # - DEPLOY_PATH: 服务器上的部署路径
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/
    
    - name: Deploy to server
      if: env.SERVER_HOST != ''
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
        SERVER_USER: ${{ secrets.SERVER_USER }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      run: |
        if [ -z "$SERVER_HOST" ]; then
          echo "⚠️ 未配置服务器信息，跳过部署"
          echo "请在 GitHub Secrets 中配置 SERVER_HOST 等变量"
          exit 0
        fi
        
        # 安装 SSH 密钥
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        
        # 添加到 known hosts
        ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
        
        # 部署文件到服务器
        rsync -avz --delete dist/ $SERVER_USER@$SERVER_HOST:$DEPLOY_PATH
        
        # 在服务器上执行部署脚本（可选）
        # ssh $SERVER_USER@$SERVER_HOST "cd $DEPLOY_PATH && ./deploy.sh"
        
        echo "✅ 部署完成！"

  # Docker 构建和推送（可选）
  docker:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    # 需要配置 Secrets：
    # - DOCKER_USERNAME: Docker Hub 用户名
    # - DOCKER_PASSWORD: Docker Hub 密码或 Token
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      if: env.DOCKER_USERNAME != ''
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      if: env.DOCKER_USERNAME != ''
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/yao-gua:latest
          ${{ secrets.DOCKER_USERNAME }}/yao-gua:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
