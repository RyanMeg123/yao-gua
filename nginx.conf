server {
    listen 80;
    server_name ryanssuit.com www.ryanssuit.com;
    
    # 重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ryanssuit.com www.ryanssuit.com;
    
    # SSL 证书（使用 certbot 申请）
    ssl_certificate /etc/letsencrypt/live/ryanssuit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ryanssuit.com/privkey.pem;
    
    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    
    # 反向代理到 Docker 容器
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # 日志
    access_log /var/log/nginx/yao-gua-access.log;
    error_log /var/log/nginx/yao-gua-error.log;
}
